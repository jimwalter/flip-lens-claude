<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flip Scout</title>
  <style>
    body {
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #0f172a;
      background: #f8fafc;
      max-width: 480px;
      margin: 15vh auto 0;
      padding: 0 24px;
      text-align: center;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 16px;
    }
    #status {
      color: #334155;
    }
    button {
      margin-top: 20px;
      margin-right: 8px;
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }
    #retry-btn {
      background: #1f8a8c;
      color: #fff;
    }
    #close-btn {
      background: #e2e8f0;
      color: #334155;
    }
  </style>
</head>
<body>
  <h1>Flip Scout</h1>
  <p id="status">Reading clipboard…</p>
  <button id="retry-btn" hidden>Retry</button>
  <button id="close-btn" hidden>Close tab</button>
  <script src="capture.js"></script>
</body>
</html>
