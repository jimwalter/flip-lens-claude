<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flip Scout</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header id="popup-header">
    <h1>Flip Scout</h1>
    <button id="settings-btn" type="button" title="Settings" aria-label="Settings">⚙</button>
  </header>

  <button id="capture-btn" type="button">Capture item</button>

  <section id="history-section">
    <div id="history-header">
      <h2>History</h2>
      <button id="clear-all-btn" type="button">Clear all</button>
    </div>
    <div id="history-list"></div>
    <p id="empty-state" hidden>No captures yet. Click Capture to get started.</p>
  </section>

  <script type="module" src="popup.js"></script>
</body>
</html>
